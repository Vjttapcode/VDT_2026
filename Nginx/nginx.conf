events {
    worker_connections 1024;
}

http {
    # Không có dòng này, nginx trả mọi file /uploads/ với Content-Type text/plain
    # -> iframe hiển thị raw bytes của PDF thay vì render. Cần map .pdf -> application/pdf.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Mặc định nginx chỉ cho body 1MB -> upload PDF/Word lớn bị 413.
    # Khớp với spring.servlet.multipart.max-request-size = 10MB của document-service.
    client_max_body_size 10m;

    upstream auth  { server auth-service:8081; }
    upstream docs  { server document-service:8082; }
    upstream notif { server notification-service:8083; }
    upstream fe    { server frontend:80; }

    server {
        listen 80;

        # Chuyển tiếp JWT xuống service
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        location /api/auth/ {
            proxy_pass http://auth/;
        }
        # /api/documents/** -> document-service /documents/** (khớp URL frontend goi)
        location /api/documents {
            proxy_pass http://docs/documents;
        }
        # NotificationController map san /api/notifications -> giu nguyen path
        location /api/notifications {
            proxy_pass http://notif;
        }
        location /uploads/ {
            alias /app/uploads/;
        }

        # SPA frontend — de cuoi, cac prefix /api|/uploads dai hon nen duoc uu tien
        location / {
            proxy_pass http://fe;
        }
    }
}