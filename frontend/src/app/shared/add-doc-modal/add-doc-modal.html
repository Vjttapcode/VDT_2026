@if (store.showAdd()) {
  <div class="modal-overlay" (click)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-head">
        <span>Thêm văn bản mới</span>
        <button class="x" (click)="close()" aria-label="Đóng">✕</button>
      </div>

      <form class="modal-body" (ngSubmit)="submit()">
        <div>
          <div class="field-label">Tên văn bản</div>
          <input class="field-input" type="text" name="title" [(ngModel)]="title"
                 placeholder="VD: Hợp đồng cung cấp dịch vụ…" required>
        </div>

        <div class="two-col">
          <div>
            <div class="field-label">Loại</div>
            <select class="field-input" name="type" [(ngModel)]="type">
              @for (t of typeOptions; track t.value) {
                <option [value]="t.value">{{ t.label }}</option>
              }
            </select>
          </div>
          <div>
            <div class="field-label">Cấp áp dụng</div>
            <select class="field-input" name="level" [(ngModel)]="level">
              @for (l of levelOptions; track l.value) {
                <option [value]="l.value">{{ l.label }}</option>
              }
            </select>
          </div>
        </div>

        <div>
          <div class="field-label">Mô tả <span class="opt">(không bắt buộc)</span></div>
          <textarea class="field-input" rows="2" name="description" [(ngModel)]="description"
                    placeholder="Ghi chú ngắn về văn bản…"></textarea>
        </div>

        <div>
          <div class="field-label">
            Thời hạn hiệu lực:
            <span class="days mono">{{ days() }} ngày</span>
            <span class="preview">(hết hạn {{ expiryPreview() }})</span>
          </div>
          <input class="range" type="range" min="7" max="730" step="1" name="days"
                 [ngModel]="days()" (ngModelChange)="days.set($event)">
        </div>

        <label class="submit-now">
          <input type="checkbox" name="submitNow" [(ngModel)]="submitNow">
          Gửi duyệt ngay sau khi tạo
        </label>

        <div class="modal-foot">
          <button type="button" class="btn-ghost" (click)="close()">Hủy</button>
          <button type="submit" class="btn-primary" [disabled]="!title.trim()">Lưu văn bản</button>
        </div>
      </form>
    </div>
  </div>
}
