<div class="login-bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="login-card">
    <div class="logo">VB</div>
    <h1>Quản lý văn bản</h1>
    <p class="sub">Hệ thống theo dõi &amp; cảnh báo văn bản hết hạn</p>

    <form (ngSubmit)="submit()">
      <div class="field-label">Email</div>
      <input class="field-input" type="email" name="email" [(ngModel)]="email"
             placeholder="ten@vdt.com" autocomplete="username" required autofocus>

      <div class="field-label" style="margin-top:14px">Mật khẩu</div>
      <input class="field-input" type="password" name="password" [(ngModel)]="password"
             placeholder="••••••••" autocomplete="current-password" required>

      @if (error(); as err) {
        <div class="error">{{ err }}</div>
      }

      <button class="btn-primary submit" type="submit" [disabled]="loading() || !email || !password">
        @if (loading()) { <span class="spinner"></span> }
        Đăng nhập
      </button>
    </form>

    <div class="demo">
      <div class="demo-title">Tài khoản demo, mật khẩu: <span class="mono">password</span></div>
      @for (acc of demoAccounts; track acc.email) {
        <button type="button" class="demo-acc" (click)="useDemo(acc.email)">
          <span class="mono email">{{ acc.email }}</span>
          <span class="role">{{ acc.label }}</span>
        </button>
      }
    </div>
  </div>
</div>
