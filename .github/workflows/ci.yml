name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: compile + package cả 4 service (matrix chạy song song)
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - document-service
          - notification-service
          - scheduler-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17" # KHỚP với <java.version>17</java.version> trong pom
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B clean package -DskipTests

  # Job 2: build toàn bộ Docker image để verify Dockerfile syntax + layer
  docker-build:
    runs-on: ubuntu-latest
    needs: build-test # chỉ build image sau khi compile OK
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker compose build
        run: docker compose build

    # Job 3: deploy lên VPS — chỉ chạy khi push lên main (KHÔNG chạy với PR)
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/VDT_2026
            git pull origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f
