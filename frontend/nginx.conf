# nginx NOI BO container frontend (khac Nginx/nginx.conf gateway)
server {
    listen 80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: moi route Angular (/dashboard, /documents...) tra index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache dai han cho static co hash trong ten file
    location ~* \.(js|css|woff2|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
