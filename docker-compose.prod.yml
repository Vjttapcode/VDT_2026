services:
  postgres:
    ports: !reset [] # gỡ map 5432 ra host (chỉ nội bộ container)

  # tuỳ chọn bảo mật: gỡ luôn các port service, chỉ để Nginx (80) public
  auth-service:
    ports: !reset []
  document-service:
    ports: !reset []
  notification-service:
    ports: !reset []
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Base docker-compose.yml set cứng SPRING_MAIL_HOST/PORT=mailhog cho dev.
      # Compose merge KHÔNG tự xoá key cũ, và biến môi trường OS luôn thắng
      # application-prod.yaml -> phải ghi đè tường minh ở đây, nếu không app
      # vẫn âm thầm nối Mailhog dù profile prod đã bật.
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD}
      ALERT_FROM: ${SMTP_USERNAME} # Gmail rewrite From về tài khoản auth
      ALERT_REDIRECT_TO: ${ALERT_REDIRECT_TO:-} # set = email test khi demo, rỗng khi chạy thật
  scheduler-service:
    ports: !reset []
  mailhog:
    ports:
      - "8025:8025" # giữ web UI mailhog nếu muốn xem mail
