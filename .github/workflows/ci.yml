name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: compile + package cả 4 service (matrix chạy song song)
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - document-service
          - notification-service
          - scheduler-service
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: vdt_db
          POSTGRES_USER: vdt
          POSTGRES_PASSWORD: vdt123
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vdt -d vdt_db"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17" # KHỚP với <java.version>17</java.version> trong pom
          cache: maven

      - name: Build + test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B clean package

  # Job 1b: build frontend Angular — fail sớm trước khi build Docker image
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (production)
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # Job 2: build toàn bộ Docker image để verify Dockerfile syntax + layer
  docker-build:
    runs-on: ubuntu-latest
    needs: [build-test, frontend-build] # chỉ build image sau khi compile OK
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker compose build
        run: docker compose build

    # Job 3: deploy lên VPS — chỉ chạy khi push lên main (KHÔNG chạy với PR)
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 40
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: "35m"
          script: |
            set -e
            cd ~/VDT_2026
            # Hard-sync về đúng origin/main (chịu được force-push / repo bẩn), thay cho git pull
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
